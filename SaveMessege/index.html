<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SafeMessage | Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="modal-overlay" style="display:flex;">
        <div class="modal-box">
            <h2 id="auth-title" style="margin-bottom:15px; font-size:20px;">SafeMessage</h2>
            <input type="text" id="reg-nick" class="auth-input" placeholder="Никнейм (только буквы/цифры)" style="display:none">
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button class="primary-btn" id="btn-auth">Войти</button>
            <p id="auth-toggle" style="cursor:pointer; color:var(--primary); font-size:12px; margin-top:5px;">Создать аккаунт</p>
        </div>
    </div>

    <div id="modal-profile" class="modal-overlay">
        <div class="modal-box">
            <h3 id="profile-nick" style="font-size:18px; margin-bottom:5px;">@nick</h3>
            
            <!-- Avatar Display -->
            <div id="profile-avatar-view" class="avatar">👤</div>
            
            <!-- Avatar Control Buttons -->
            <div class="avatar-buttons-container">
                <button class="primary-btn" id="upload-avatar-btn" onclick="uploadAvatarPhoto()">
                    <i class="fa-solid fa-camera"></i> Upload
                </button>
                <button class="primary-btn" id="remove-avatar-btn" onclick="removeAvatarPhoto()">
                    <i class="fa-solid fa-trash"></i> Remove
                </button>
            </div>
            
            <!-- Emoji Grid -->
            <div class="emoji-grid" id="profile-emojis"></div>
            
            <!-- Close Buttons -->
            <button class="primary-btn" style="background:#ef4444; margin-top:5px;">
                <i class="fa-solid fa-sign-out-alt"></i> Выйти
            </button>
            <button class="primary-btn" style="background:transparent; color:var(--text-main);" onclick="closeAllModals()">Закрыть</button>
        </div>
    </div>

    <div id="modal-group" class="modal-overlay">
        <div class="modal-box">
            <h3 style="font-size:17px; margin-bottom:10px;">Новая группа</h3>
            <input type="text" id="new-group-name" class="auth-input" placeholder="Название группы">
            <button class="primary-btn" onclick="confirmCreateGroup()">Создать</button>
            <button class="primary-btn" style="background:transparent; color:var(--text-main);" onclick="closeAllModals()">Отмена</button>
        </div>
    </div>

    <div id="modal-member" class="modal-overlay">
        <div class="modal-box">
            <h3 style="font-size:17px; margin-bottom:10px;">Добавить участника</h3>
            <input type="text" id="member-nick" class="auth-input" placeholder="Никнейм друга">
            <button class="primary-btn" onclick="confirmAddMember()">Добавить</button>
            <button class="primary-btn" style="background:transparent; color:var(--text-main);" onclick="closeAllModals()">Отмена</button>
        </div>
    </div>

    <div id="modal-incoming-call" class="modal-overlay" style="z-index: 5000;">
        <div class="modal-box">
            <h3 style="margin-bottom: 8px; font-size:17px;">Входящий звонок</h3>
            <p id="caller-name" style="color:var(--text-muted); margin-bottom: 15px; font-size:13px;">Кто-то звонит вам...</p>
            <div style="display:flex; gap:10px;">
                <button class="primary-btn btn-answer" onclick="answerCall()"><i class="fa-solid fa-phone"></i></button>
                <button class="primary-btn btn-hangup" onclick="rejectCall()"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>
    </div>

    <div id="call-screen" class="call-screen">
        <div class="video-container" id="video-grid">
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button class="call-btn" id="btn-mic" style="background: #334155;" onclick="toggleMic()"><i class="fa-solid fa-microphone"></i></button>
            <button class="call-btn btn-hangup" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
            <button class="call-btn" id="btn-cam" style="background: #334155;" onclick="toggleCam()"><i class="fa-solid fa-video"></i></button>
        </div>
    </div>

    <div class="app-container" id="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px;">
                    <h2 style="font-size:19px;">Чаты</h2>
                    <div style="display:flex; gap:12px; align-items:center;">
                        <i class="fa-solid fa-users" style="cursor:pointer; color:var(--primary); font-size:18px;" onclick="openModal('modal-group')"></i>
                        <div id="my-avatar" class="avatar" style="width:35px; height:35px; font-size:16px; cursor:pointer;" onclick="openProfile()">👤</div>
                    </div>
                </div>
                <div style="display:flex; gap:6px;">
                    <input type="text" id="search-user" class="auth-input" placeholder="Ник друга..." style="margin:0; padding:10px; font-size:13px;">
                    <button class="primary-btn" style="width:40px; margin:0; padding:0; flex-shrink:0;" onclick="startDM()"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div class="chat-list" id="ui-chats"></div>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <i class="fa-solid fa-arrow-left" id="btn-back" onclick="closeChat()"></i>
                <div class="avatar-wrap">
                    <div id="active-emoji" class="avatar">👤</div>
                    <div id="active-status-dot" class="status-dot dot-offline"></div>
                </div>
                <div style="margin-left:10px; flex:1; min-width:0;">
                    <h3 id="active-name" style="font-size:15px; display:flex; align-items:center; gap:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Выберите чат</h3>
                    <div id="typing-indicator" class="typing-label" style="display:none; font-size:11px;">печатает...</div>
                </div>
                <div style="display:flex; gap:12px; align-items:center; flex-shrink:0;">
                    <i class="fa-solid fa-video" id="btn-call" style="display:none; color:var(--primary); cursor:pointer; font-size:18px;" onclick="startCall()"></i>
                    <i class="fa-solid fa-user-plus" id="add-member-btn" style="display:none; color:var(--primary); cursor:pointer; font-size:18px;" onclick="openModal('modal-member')"></i>
                </div>
            </div>

            <div class="messages" id="ui-msgs"></div>

            <div class="reply-preview-bar" id="reply-bar">
                <div class="reply-preview-content">
                    <div class="reply-preview-nick" id="reply-nick">Ник</div>
                    <div class="reply-preview-text" id="reply-text">Текст...</div>
                </div>
                <i class="fa-solid fa-xmark" style="cursor:pointer; padding:4px; flex-shrink:0;" onclick="cancelReply()"></i>
            </div>

            <div class="input-bar">
                <input type="file" id="file-input" style="display:none" accept="image/*, video/mp4, video/webm, image/gif">
                <button class="primary-btn" style="width:36px; background:transparent; margin:0; padding:0; flex-shrink:0;" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="text" id="input-msg" class="msg-input" placeholder="Сообщение...">
                <button class="primary-btn" style="width:44px; border-radius:50%; margin:0; padding:0; flex-shrink:0;" onclick="sendMsg()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
